name: Deploy Staging

# Ladder step: main branch -> staging environment.
# Auto-deploys on every push to main (main is reached via the dev -> main promote PR).
on:
  push:
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ vars.ODP_STAGING_DEPLOY_URL }}
