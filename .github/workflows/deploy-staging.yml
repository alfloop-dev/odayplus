name: Deploy/Verify Staging

# Ladder step: main branch -> staging environment.
# Runs on every push to main (main is reached via the dev -> main promote PR)
# and fails closed until a real staging target proves the promoted SHA.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      expected_sha:
        description: "Release SHA expected at /platform/version; defaults to the workflow SHA."
        required: false
        type: string

concurrency:
  group: deploy-staging
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ vars.ODP_STAGING_DEPLOY_URL }}
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: infra/docker/api.Dockerfile
          - name: web
            dockerfile: infra/docker/web.Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Run Secret Scan
        run: python3 scripts/security/secret_scan.py

      - name: Run Python SAST Scan
        run: python3 scripts/security/sast_scan.py

      - name: Generate SBOM
        run: python3 scripts/security/generate_sbom.py

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        # Use raw tag and sha tag as before
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.name }}
          tags: |
            type=raw,value=staging
            type=sha,format=long

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        id: build-and-push
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          sbom: true
          provenance: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign the published Docker image
        env:
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: |
          cosign sign --yes "ghcr.io/${{ github.repository }}-${{ matrix.name }}@${DIGEST}"

  deploy-staging:
    needs: build-and-publish
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ vars.ODP_STAGING_DEPLOY_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify image signatures before deploy
        run: |
          CI=true ./scripts/security/sign_images.sh verify "ghcr.io/${{ github.repository }}-api:staging"
          CI=true ./scripts/security/sign_images.sh verify "ghcr.io/${{ github.repository }}-web:staging"

      - name: Resolve release authority
        run: |
          expected_sha="${{ inputs.expected_sha }}"
          if [ -z "$expected_sha" ]; then
            expected_sha="${GITHUB_SHA}"
          fi
          echo "ODAY_RELEASE_SHA=${expected_sha}" >> "$GITHUB_ENV"
          echo "Resolved staging release SHA."

      - name: Verify staging configuration and release SHA
        env:
          ODP_STAGING_DEPLOY_URL: ${{ vars.ODP_STAGING_DEPLOY_URL }}
          ODP_STAGING_API_URL: ${{ vars.ODP_STAGING_API_URL }}
          ODP_STAGING_SECRET_OWNER: ${{ vars.ODP_STAGING_SECRET_OWNER }}
        run: |
          python3 scripts/e2e/check_remote_staging_proof.py \
            --expected-sha "$ODAY_RELEASE_SHA" \
            --correlation-id "corr-staging-${GITHUB_RUN_ID}" \
            --output ".odp_data/remote-staging-proof/staging-${GITHUB_RUN_ID}.json"

      - name: Upload staging proof report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: remote-staging-proof
          path: .odp_data/remote-staging-proof/*.json
          if-no-files-found: ignore
