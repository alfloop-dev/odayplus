name: One-shot Assisted Intake Normative Register Sync

on:
  push:
    branches:
      - agent/assisted-listing-intake-system-design
    paths:
      - scripts/apply_assisted_intake_normative_register_fix.py
      - .github/workflows/apply-assisted-intake-normative-register-fix.yml

permissions:
  contents: write

jobs:
  synchronize:
    if: ${{ !contains(github.event.head_commit.message, '[normative-sync]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/assisted-listing-intake-system-design

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply deterministic synchronization
        run: |
          python -m py_compile scripts/apply_assisted_intake_normative_register_fix.py
          python scripts/apply_assisted_intake_normative_register_fix.py
          python -m py_compile scripts/validate_assisted_listing_intake_design.py
          python -m py_compile scripts/build_validate_assisted_listing_intake_openapi.py

      - name: Remove one-shot machinery and commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm scripts/apply_assisted_intake_normative_register_fix.py
          git rm .github/workflows/apply-assisted-intake-normative-register-fix.yml
          git add docs/design/ODAY_PLUS_ASSISTED_LISTING_INTAKE_SYSTEM_DESIGN_RESPONSE.md
          git add docs/design/ODAY_PLUS_ASSISTED_LISTING_INTAKE_V021_CROSS_CONTRACT_CORRECTIONS.md
          git add docs/design/ODAY_PLUS_ASSISTED_LISTING_INTAKE_REVIEW_MANIFEST.yaml
          git add scripts/validate_assisted_listing_intake_design.py
          git add scripts/build_validate_assisted_listing_intake_openapi.py
          git commit -m "[normative-sync] unify artifact register precedence and apply order"
          git push origin HEAD:agent/assisted-listing-intake-system-design
