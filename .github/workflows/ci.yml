name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Create local config from example
        run: cp .orchestrator/config.example.json .orchestrator/config.json

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest
