# CI Workflow config. To run the full CI suite locally, use: make ci
name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  orchestrator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: uv sync

      - name: Prepare local config
        run: make bootstrap

      - name: Lint orchestrator code
        run: uv run ruff check .orchestrator scripts

      - name: Test orchestrator code
        run: uv run pytest -m "not requires_live_env" .orchestrator scripts

  product:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history: the API contract gate diffs the OpenAPI artifact
          # against its merge base with the target branch. The default shallow
          # clone has no merge base, which would make the breaking-change check
          # silently skip rather than fail.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: uv sync

      - name: Prepare local config
        run: make bootstrap

      - name: Lint product code
        run: uv run ruff check tests modules apps shared models solver pipelines infra

      - name: Test product code
        run: uv run pytest -m "not requires_live_env" tests modules apps shared models

      # Blocks: an API change that never reached the checked-in OpenAPI
      # artifact, an artifact change that never reached the generated client,
      # and any breaking change not listed in
      # scripts/openapi/approved_breaking_changes.json (ODP-PGAP-API-001).
      - name: Check API contract drift
        run: make api-contract
        env:
          ODP_API_BASE_REF: ${{ github.base_ref && format('origin/{0}', github.base_ref) || 'origin/dev' }}

      - name: Run security checks
        run: make security

      - name: Run Node workspace checks
        run: make node-check

  product-e2e-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install product E2E dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run product E2E release gate
        run: make product-release-gate
