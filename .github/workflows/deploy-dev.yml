name: Deploy Dev

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  e2e-operational-evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run E2E deployment health, backup, restore, and rollback proof
        run: python3 scripts/e2e/verify_deployment_health_backup_rollback.py

  deploy:
    needs: e2e-operational-evidence
    runs-on: ubuntu-latest
    environment:
      name: dev
      url: ${{ vars.ODP_DEV_DEPLOY_URL }}
    env:
      HAS_WIF: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_SERVICE_ACCOUNT != '' }}
      HAS_GCP_SA_KEY: ${{ secrets.GCP_SA_KEY != '' }}
      GCP_PROJECT: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      GCP_AR_REPO: ${{ vars.GCP_AR_REPO }}
      GCP_CLOUD_SQL_INSTANCE: ${{ vars.GCP_CLOUD_SQL_INSTANCE }}
      API_SERVICE: ${{ vars.ODP_CLOUD_RUN_API_SERVICE }}
      WEB_SERVICE: ${{ vars.ODP_CLOUD_RUN_WEB_SERVICE }}
      ODP_CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT: ${{ vars.ODP_CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT }}
      ODP_SNAPSHOT_BUCKET: ${{ vars.ODP_SNAPSHOT_BUCKET }}
      ODP_LISTING_PROVIDER_FEED_URL: ${{ vars.ODP_LISTING_PROVIDER_FEED_URL }}
      ODP_GEOCODE_PROVIDER_URL: ${{ vars.ODP_GEOCODE_PROVIDER_URL }}
      ODP_LISTING_PROVIDER_AUTH_STATUS: ${{ vars.ODP_LISTING_PROVIDER_AUTH_STATUS }}
      ODP_POI_PROVIDER_AUTH_STATUS: ${{ vars.ODP_POI_PROVIDER_AUTH_STATUS }}
      ODP_GEOCODE_PROVIDER_AUTH_STATUS: ${{ vars.ODP_GEOCODE_PROVIDER_AUTH_STATUS }}
      ODP_ADMIN_BOUNDARY_PROVIDER_AUTH_STATUS: ${{ vars.ODP_ADMIN_BOUNDARY_PROVIDER_AUTH_STATUS }}
      ODP_PRODUCTION_PROVIDER_IDS: ${{ vars.ODP_PRODUCTION_PROVIDER_IDS }}
      ODP_COMPETITOR_MANUAL_SOURCE_STATUS: disabled
      ODP_AUTH_ISSUER: ${{ vars.ODP_AUTH_ISSUER }}
      ODP_AUTH_AUDIENCES: ${{ vars.ODP_AUTH_AUDIENCES }}
      ODP_OPERATOR_SMOKE_ROLE: ${{ vars.ODP_OPERATOR_SMOKE_ROLE }}
      ODP_OPERATOR_SMOKE_SUBJECT: ${{ vars.ODP_OPERATOR_SMOKE_SUBJECT }}
      ODP_OPERATOR_SMOKE_TENANT: ${{ vars.ODP_OPERATOR_SMOKE_TENANT }}
      ODAY_DATABASE_URL_SECRET: ${{ vars.ODAY_DATABASE_URL_SECRET }}
      ODP_LISTING_PROVIDER_API_KEY_SECRET: ${{ vars.ODP_LISTING_PROVIDER_API_KEY_SECRET }}
      ODP_POI_PROVIDER_API_KEY_SECRET: ${{ vars.ODP_POI_PROVIDER_API_KEY_SECRET }}
      ODP_GEOCODE_PROVIDER_API_KEY_SECRET: ${{ vars.ODP_GEOCODE_PROVIDER_API_KEY_SECRET }}
      ODP_ADMIN_BOUNDARY_PROVIDER_TOKEN_SECRET: ${{ vars.ODP_ADMIN_BOUNDARY_PROVIDER_TOKEN_SECRET }}
      ODP_AUTH_HS256_KEYS_SECRET: ${{ vars.ODP_AUTH_HS256_KEYS_SECRET }}
      ODP_DEPLOY_ENV: dev
      ODAY_RELEASE_SHA: ${{ github.sha }}
      ODP_REQUIRE_LIVE_DATA: "true"
      ODP_DATA_BINDING_MODE: live
      ODP_PRODUCT_MODE: production
      ODP_EXTERNAL_PROVIDER_MODE: live
      ODP_PERSISTENCE: postgresql
      ODP_OBJECT_STORE: gcs
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Run Secret Scan
        run: python3 scripts/security/secret_scan.py

      - name: Run Python SAST Scan
        run: python3 scripts/security/sast_scan.py

      - name: Generate SBOM
        run: python3 scripts/security/generate_sbom.py

      - name: Validate authentication and live runtime preflight
        env:
          ODP_OPERATOR_SMOKE_BEARER_TOKEN: ${{ secrets.ODP_OPERATOR_SMOKE_BEARER_TOKEN }}
        run: |
          if [ "${HAS_WIF}" != "true" ] && [ "${HAS_GCP_SA_KEY}" != "true" ]; then
            echo "Error: configure WIF variables or the GCP_SA_KEY secret." >&2
            exit 1
          fi
          python3 scripts/deployment/validate_cloud_run_live_deployment.py preflight \
            --environment dev \
            --release-sha "${ODAY_RELEASE_SHA}" \
            --output .odp_data/deployment/cloud-run-preflight.json

      - name: Authenticate to Google Cloud (WIF)
        if: ${{ env.HAS_WIF == 'true' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Authenticate to Google Cloud (SA Key)
        if: ${{ env.HAS_GCP_SA_KEY == 'true' && env.HAS_WIF != 'true' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Build, push, deploy, and verify Cloud Run
        env:
          IMAGE_TAG: dev-${{ github.sha }}
          ODP_OPERATOR_SMOKE_BEARER_TOKEN: ${{ secrets.ODP_OPERATOR_SMOKE_BEARER_TOKEN }}
        run: ./scripts/deploy_cloud_run_waji.sh

      - name: Upload deployment validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloud-run-dev-validation
          path: .odp_data/deployment/*.json
          if-no-files-found: ignore
