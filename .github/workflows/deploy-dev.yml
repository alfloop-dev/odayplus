name: Deploy Dev

# Ladder step: dev branch -> dev environment.
# On every push to dev (after CI gates the merge), build the API + web container
# images from the actual source and publish them to GitHub Container Registry.
# These are the real, runnable artifacts the dev environment deploys.
on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  e2e-operational-evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run E2E deployment health, backup, restore, and rollback proof
        run: python3 scripts/e2e/verify_deployment_health_backup_rollback.py

  build-and-publish:
    needs: e2e-operational-evidence
    runs-on: ubuntu-latest
    environment:
      name: dev
      url: ${{ vars.ODP_DEV_DEPLOY_URL }}
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: infra/docker/api.Dockerfile
          - name: web
            dockerfile: infra/docker/web.Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Run Secret Scan
        run: python3 scripts/security/secret_scan.py

      - name: Run Python SAST Scan
        run: python3 scripts/security/sast_scan.py

      - name: Generate SBOM
        run: python3 scripts/security/generate_sbom.py

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
          # Use raw tag and sha tag as before
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.name }}
          tags: |
            type=raw,value=dev
            type=sha,format=long

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        id: build-and-push
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          sbom: true
          provenance: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign the published Docker image
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images="${images} ${tag}"
          done
          for img in ${images}; do
            cosign sign --yes "${img}@${DIGEST}"
          done

  deploy:
    needs: build-and-publish
    runs-on: ubuntu-latest
    environment:
      name: dev
      url: ${{ vars.ODP_DEV_DEPLOY_URL }}
    steps:
      # Images are published to ghcr.io/<owner>/odayplus-{api,web}:dev.
      # When a dev host exists, wire the rollout here: pull the :dev images and
      # `docker compose up -d`. Until ODP_DEV_HOST is configured the publish above
      # is the real, verifiable artifact step and this just reports next steps.
      - name: Roll out to dev host
        if: ${{ vars.ODP_DEV_HOST != '' }}
        run: |
          echo "Deploy target: ${{ vars.ODP_DEV_HOST }}"
          echo "Pull ghcr.io/${{ github.repository }}-{api,web}:dev and restart the stack."
          echo "Add ODP_DEV_HOST + SSH secrets to enable the actual rollout."

      - name: No rollout target configured
        if: ${{ vars.ODP_DEV_HOST == '' }}
        run: |
          echo "Images published to GHCR (tags: dev, sha-<commit>)."
          echo "No ODP_DEV_HOST set -> no remote rollout. Run locally with: docker compose up --build"
