name: Deploy Dev

# Ladder step: dev branch -> dev environment.
# Auto-deploys on every push to dev (after the CI workflow gates merges into dev).
on:
  push:
    branches: [dev]

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment:
      name: dev
      url: ${{ vars.ODP_DEV_DEPLOY_URL }}
