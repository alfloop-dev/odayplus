name: Deploy Dev

# Ladder step: dev branch -> dev environment.
# On every push to dev (after CI gates the merge), build the API + web container
# images from the actual source and publish them to GitHub Container Registry.
# These are the real, runnable artifacts the dev environment deploys.
on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  e2e-operational-evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run E2E deployment health, backup, restore, and rollback proof
        run: python3 scripts/e2e/verify_deployment_health_backup_rollback.py

  deploy:
    needs: e2e-operational-evidence
    runs-on: ubuntu-latest
    environment:
      name: dev
      url: ${{ vars.ODP_DEV_DEPLOY_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Run Secret Scan
        run: python3 scripts/security/secret_scan.py

      - name: Run Python SAST Scan
        run: python3 scripts/security/sast_scan.py

      - name: Generate SBOM
        run: python3 scripts/security/generate_sbom.py

      - name: Validate GCP Deployment Variables
        run: |
          echo "Checking deployment configuration..."
          MISSING_CONFIG=0
          if [ -z "${{ vars.GCP_PROJECT_ID }}" ]; then
            echo "Error: vars.GCP_PROJECT_ID is not configured." >&2
            MISSING_CONFIG=1
          fi
          if [ -z "${{ vars.GCP_REGION }}" ]; then
            echo "Error: vars.GCP_REGION is not configured." >&2
            MISSING_CONFIG=1
          fi
          if [ -z "${{ vars.GCP_AR_REPO }}" ]; then
            echo "Error: vars.GCP_AR_REPO is not configured." >&2
            MISSING_CONFIG=1
          fi

          has_wif=false
          if [ -n "${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ] && [ -n "${{ vars.GCP_SERVICE_ACCOUNT }}" ]; then
            has_wif=true
          fi

          has_sa=false
          if [ -n "${{ secrets.GCP_SA_KEY }}" ]; then
            has_sa=true
          fi

          if [ "$has_wif" = "false" ] && [ "$has_sa" = "false" ]; then
            echo "Error: GCP authentication is not configured. Configure either vars.GCP_WORKLOAD_IDENTITY_PROVIDER and vars.GCP_SERVICE_ACCOUNT (for WIF), or secrets.GCP_SA_KEY (for Service Account JSON Key)." >&2
            MISSING_CONFIG=1
          fi

          if [ "$MISSING_CONFIG" -ne 0 ]; then
            echo "Failed configuration validation. Aborting workflow (fail-closed)." >&2
            exit 1
          fi
          echo "All required configurations are present."

      - name: Authenticate to Google Cloud (WIF)
        if: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Authenticate to Google Cloud (SA Key)
        if: ${{ secrets.GCP_SA_KEY != '' && (vars.GCP_WORKLOAD_IDENTITY_PROVIDER == '' || vars.GCP_SERVICE_ACCOUNT == '') }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Build, Push, and Deploy to Cloud Run
        env:
          GCP_PROJECT: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          GCP_AR_REPO: ${{ vars.GCP_AR_REPO }}
          IMAGE_TAG: dev-${{ github.sha }}
        run: |
          chmod +x scripts/deploy_cloud_run_waji.sh
          ./scripts/deploy_cloud_run_waji.sh
