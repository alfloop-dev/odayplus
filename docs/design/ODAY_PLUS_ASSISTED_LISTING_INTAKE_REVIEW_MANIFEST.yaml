required_pre_review_checks:
  - all normative_artifacts paths exist
  - consolidated response and correction pack identify effective_response_version
  - all SDI-001 through SDI-024 appear in the decision matrix
  - SLA and decision transition tables exist
  - old final promotion route is removed by command overlay
  - promotion request and independent review endpoints exist
  - promotion PENDING_REVIEW is valid in SQL
  - v1 review actions have complete approve/reject state semantics
  - assignment claim transfer complete and SLA pause resume endpoints exist
  - authorization denial codes are present in the canonical API error registry
  - state-referenced domain events exist in base catalog or addendum
  - all event schema_ref values resolve to complete typed payload schemas
  - effective OpenAPI is built by applying every overlay in order
  - effective OpenAPI passes openapi-spec-validator and Redocly lint with zero errors or warnings
  - every effective Response Object has description
  - ApiError requires and defines occurred_at and next_action
  - all four schema artifacts apply successfully to PostgreSQL 16
  - every tenant-bearing table has ENABLE and FORCE ROW LEVEL SECURITY
  - every tenant-bearing table has a fail-closed tenant_isolation policy
  - every tenant-scoped foreign-key relationship has a tenant-qualified composite counterpart
  - all required lineage constraints exist in PostgreSQL catalog
  - URL and snapshot uniqueness preserve revision and evidence lineage
  - LEGACY_RECONCILED is valid in schema and migration contract
  - reviewed_commit equals current PR head
  - formal review commit is a descendant of reviewed_commit

openapi_bundle_order:
  - docs/api/openapi/ODAY_PLUS_ASSISTED_LISTING_INTAKE_V1.yaml
  - docs/api/openapi/ODAY_PLUS_ASSISTED_LISTING_INTAKE_V1_0_1_PRELUDE_OVERLAY.yaml
  - docs/api/openapi/ODAY_PLUS_ASSISTED_LISTING_INTAKE_V1_1_OVERLAY.yaml
  - docs/api/openapi/ODAY_PLUS_ASSISTED_LISTING_INTAKE_V1_1_1_CONSISTENCY_OVERLAY.yaml
  - docs/api/openapi/ODAY_PLUS_ASSISTED_LISTING_INTAKE_V1_1_2_LINT_OVERLAY.yaml
  - docs/api/openapi/ODAY_PLUS_ASSISTED_LISTING_INTAKE_V1_1_3_REDOCLY_OVERLAY.yaml

schema_apply_order:
  - docs/data/ODAY_PLUS_ASSISTED_LISTING_INTAKE_SCHEMA.sql
  - docs/data/ODAY_PLUS_ASSISTED_LISTING_INTAKE_SCHEMA_0002_CONSISTENCY_PATCH.sql
  - docs/data/ODAY_PLUS_ASSISTED_LISTING_INTAKE_SCHEMA_0003_PROMOTION_STATE_PATCH.sql
  - docs/data/ODAY_PLUS_ASSISTED_LISTING_INTAKE_SCHEMA_0004_TENANT_RLS_LINEAGE_PATCH.sql

formal_review_command: >-
  python scripts/validate_assisted_listing_intake_design.py
  --reviewed-commit <current-pr-head>
  --current-pr-head <current-pr-head>
  --base-commit <current-dev-head>
  --strict-review-target

fail_closed_gates:
  openapi_bundle_build_or_lint_failed: assisted_intake_v1_read=false, assisted_intake_v1_write=false
  event_payload_schema_incomplete: assisted_intake_v1_events=false
  tenant_fk_rls_or_policy_validation_failed: assisted_intake_v1_write=false
  promotion_contract_tests_failed: assisted_intake_v1_promotion=false
  stale_review_target: no approval or changes-requested decision may be attributed to current head
  invalid_review_lineage: review artifact cannot merge independently of reviewed artifacts
