    schema_ref: '#/payloads/AuditRecordedV1'
    sensitive_fields: []
    consumers: [audit_projection, evidence_verifier]
    retention_days: 30

payloads:
  IntakeSubmittedV1:
    required: [intake_id, intake_method, submitter_subject_id, submitted_at, scope]
  IntakeStateChangedV1:
    required: [intake_id, from_state, to_state, transition_id, reason_code, version]
  SnapshotCreatedV1:
    required: [source_snapshot_id, intake_id, source_id, content_sha256, captured_at, retention_class]
  ParserRunCompletedV1:
    required: [parser_run_id, intake_id, parser_release_id, status, quality_summary]
  MatchReviewRequiredV1:
    required: [match_case_id, intake_id, outcome, confidence, candidate_ids, contradictory_signals]
  MatchDecidedV1:
    required: [match_decision_id, match_case_id, decision_type, status, reviewer_subject_id]
  IdentityResolutionChangedV1:
    required: [decision_id, effective_property_id, closed_edge_ids, created_edge_ids, redirect_ids]
  ListingChangedV1:
    required: [listing_id, property_id, current_revision_id, lifecycle_state, version]
  ListingStatusChangedV1:
    required: [listing_id, from_state, to_state, observation_id, version]
  AssignmentChangedV1:
    required: [assignment_id, intake_id, status, owner_subject_id, due_at, version]
  SlaBreachedV1:
    required: [sla_instance_id, intake_id, due_at, breached_at, escalation_level]
  PromotionChangedV1:
    required: [promotion_decision_id, intake_id, listing_id, status, version]
  CandidateCreatedV1:
    required: [candidate_site_id, property_id, source_listing_id, target_format_code, version]
  JobDeadLetteredV1:
    required: [job_id, job_type, checkpoint, attempt, error_code, dead_lettered_at]
  AuditRecordedV1:
    required: [audit_event_id, action, resource_type, resource_id, result, event_sha256]
