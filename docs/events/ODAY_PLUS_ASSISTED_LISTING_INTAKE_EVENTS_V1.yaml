    transaction_owner: identity.source_identity_edges
    aggregate_type: property
    partition_key: tenant_id:effective_property_id
    ordering_scope: one_effective_property_graph
    schema_ref: '#/payloads/IdentityResolutionChangedV1'
    sensitive_fields: []
    consumers: [listing_projection, candidate_projection, search_indexer, analytics_ingestion, reconciliation_service]
    retention_days: 30
  - event_type: listing.created
    event_version: 1
    producer: listing_service
    transaction_owner: expansion.listings
    aggregate_type: listing
    partition_key: tenant_id:listing_id
    ordering_scope: one_listing
    schema_ref: '#/payloads/ListingChangedV1'
    sensitive_fields: []
    consumers: [listing_inbox_projection, search_indexer, analytics_ingestion]
    retention_days: 14
  - event_type: listing.revised
    event_version: 1
    producer: listing_service
    transaction_owner: expansion.listing_revisions
    aggregate_type: listing
    partition_key: tenant_id:listing_id
    ordering_scope: one_listing
    schema_ref: '#/payloads/ListingChangedV1'
    sensitive_fields: []
    consumers: [listing_inbox_projection, candidate_projection, search_indexer, analytics_ingestion]
    retention_days: 14
  - event_type: listing.status_changed
    event_version: 1
    producer: listing_service
    transaction_owner: expansion.listings
    aggregate_type: listing
    partition_key: tenant_id:listing_id
    ordering_scope: one_listing
    schema_ref: '#/payloads/ListingStatusChangedV1'
    sensitive_fields: []
    consumers: [listing_inbox_projection, candidate_projection, task_projection, analytics_ingestion]
    retention_days: 14
  - event_type: assignment.assigned
    event_version: 1
    producer: workflow_service
    transaction_owner: workflow.assignments
    aggregate_type: assignment
    partition_key: tenant_id:intake_id
    ordering_scope: one_intake_assignment
    schema_ref: '#/payloads/AssignmentChangedV1'
    sensitive_fields: []
    consumers: [task_projection, notification_service, sla_service]
