  - event_type: candidate.promotion_requested
    event_version: 1
    producer: candidate_promotion_service
    transaction_owner: expansion.promotion_decisions
    aggregate_type: promotion_decision
    partition_key: tenant_id:promotion_decision_id
    ordering_scope: one_promotion
