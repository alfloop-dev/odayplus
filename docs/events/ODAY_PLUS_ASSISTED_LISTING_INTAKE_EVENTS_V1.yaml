    sensitive_fields: []
    consumers: [task_projection, notification_service, operator_console_projection]
    retention_days: 14
  - event_type: candidate.created
    event_version: 1
    producer: candidate_promotion_service
    transaction_owner: expansion.candidate_sites
    aggregate_type: candidate_site
    partition_key: tenant_id:candidate_site_id
    ordering_scope: one_candidate
    schema_ref: '#/payloads/CandidateCreatedV1'
    sensitive_fields: []
    consumers: [sitescore_orchestrator, candidate_projection, search_indexer, analytics_ingestion]
    retention_days: 30
  - event_type: candidate.promotion_completed
    event_version: 1
    producer: candidate_promotion_service
