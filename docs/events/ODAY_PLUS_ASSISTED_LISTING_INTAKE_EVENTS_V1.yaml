contract_id: ODP-SD-INTAKE-EVENTS-001
version: 1.0.0
status: proposed
owner: System Design / Platform Engineering
compatibility_policy:
  mode: backward_compatible
  rules:
    - consumers must ignore unknown optional fields
    - required fields cannot be removed within a major version
    - enum expansion requires consumer readiness evidence
    - incompatible change requires a new event major version and dual publication window
transport:
  internal_bus: Google Pub/Sub
  publication: transactional_outbox
  delivery: at_least_once
  ordering: per_partition_key
  schema_registry: repository_committed_json_schema_then_registry_on_release
  outbox_retention_days: 30
  published_event_retention_days: 14
  dead_letter_retention_days: 30
  replay_authority: PLATFORM_SRE_WITH_DOMAIN_OWNER_APPROVAL
webhooks:
  supported_in_release: false
  decision: |
    External webhooks are not part of Assisted Listing Intake v1. External
    integrations use approved internal Pub/Sub consumers or polling APIs.
    Adding webhooks requires a separate approved alignment/ADR covering endpoint
    registration, HMAC signing, replay protection, rotation, suspension, and evidence.
  fail_closed_behavior: webhook endpoint registration APIs do not exist and outbound HTTP delivery is disabled

envelope:
  type: object
  required:
    - event_id
    - event_type
    - event_version
    - occurred_at
    - producer
    - tenant_id
    - aggregate_type
    - aggregate_id
    - aggregate_version
    - partition_key
    - correlation_id
    - payload
  properties:
    event_id: {type: string, format: uuid}
    event_type: {type: string}
    event_version: {type: integer, minimum: 1}
    occurred_at: {type: string, format: date-time}
    published_at: {type: [string, 'null'], format: date-time}
    producer: {type: string}
    tenant_id: {type: string, format: uuid}
    aggregate_type: {type: string}
    aggregate_id: {type: string, format: uuid}
    aggregate_version: {type: integer, minimum: 1}
    partition_key: {type: string}
    correlation_id: {type: string, format: uuid}
    causation_id: {type: [string, 'null'], format: uuid}
    actor_ref: {type: [string, 'null']}
    policy_version: {type: [string, 'null']}
    schema_ref: {type: string}
    sensitive_fields: {type: array, items: {type: string}}
    payload: {type: object}

delivery_contract:
  outbox_transaction_owner: aggregate_write_transaction
  publisher_claim:
    mechanism: SELECT_FOR_UPDATE_SKIP_LOCKED
    lease_seconds: 60
    batch_size: 200
  deduplication:
    key: tenant_id:event_id
    consumer_ttl_days: 30
    aggregate_guard: aggregate_type:aggregate_id:aggregate_version:event_type
  retry:
    schedule_seconds: [10, 30, 120, 600, 1800]
    max_attempts: 10
    jitter: full
  dead_letter:
    topic_suffix: .dlq
    alert_after_attempt: 5
    alert_owner: Platform SRE and event domain owner
    poison_isolation: one message per DLQ entry with original envelope and delivery evidence
  acknowledgement:
    publisher_marks_published_only_after_pubsub_message_id_is_returned
  replay:
    source: retained_outbox_or_audit_verified_archive
    requires: incident_or_change_id, domain_owner_approval, time_range, event_filter, dry_run_count
    preserves_event_id: true
    adds_replay_metadata: true
  sensitive_data:
    default: no_raw_snapshot_content_no_credentials_no_personal_contact
    masking: payload schemas expose opaque IDs and classification metadata

catalog:
  - event_type: intake.submitted
    event_version: 1
    producer: listing_intake_service
    transaction_owner: intake.intakes
    aggregate_type: intake
    partition_key: tenant_id:intake_id
    ordering_scope: one_intake
    schema_ref: '#/payloads/IntakeSubmittedV1'
    sensitive_fields: [payload.original_url]
    consumers: [intake_orchestrator, task_projection, audit_projection, analytics_ingestion]
    retention_days: 14
  - event_type: intake.state_changed
    event_version: 1
    producer: listing_intake_service
    transaction_owner: intake.intake_stage_transitions
    aggregate_type: intake
    partition_key: tenant_id:intake_id
    ordering_scope: one_intake
    schema_ref: '#/payloads/IntakeStateChangedV1'
    sensitive_fields: []
    consumers: [operator_console_projection, task_projection, sla_service, analytics_ingestion]
    retention_days: 14
  - event_type: snapshot.created
    event_version: 1
    producer: retrieval_service
    transaction_owner: intake.source_snapshots
    aggregate_type: source_snapshot
    partition_key: tenant_id:intake_id
    ordering_scope: one_intake
    schema_ref: '#/payloads/SnapshotCreatedV1'
    sensitive_fields: [payload.object_uri]
    consumers: [parser_orchestrator, evidence_index, reconciliation_service]
    retention_days: 14
  - event_type: parser.run_completed
    event_version: 1
    producer: parser_service
    transaction_owner: intake.parser_runs
    aggregate_type: parser_run
    partition_key: tenant_id:intake_id
    ordering_scope: one_intake
    schema_ref: '#/payloads/ParserRunCompletedV1'
    sensitive_fields: []
    consumers: [matcher_service, operator_console_projection, data_quality_projection]
    retention_days: 14
  - event_type: match.review_required
    event_version: 1
    producer: matcher_service
    transaction_owner: identity.match_cases
    aggregate_type: match_case
    partition_key: tenant_id:match_case_id
    ordering_scope: one_match_case
    schema_ref: '#/payloads/MatchReviewRequiredV1'
    sensitive_fields: []
    consumers: [task_projection, notification_service, operator_console_projection]
    retention_days: 14
  - event_type: match.decided
    event_version: 1
    producer: identity_resolution_service
    transaction_owner: identity.match_decisions
    aggregate_type: match_case
    partition_key: tenant_id:match_case_id
    ordering_scope: one_match_case
    schema_ref: '#/payloads/MatchDecidedV1'
    sensitive_fields: []
