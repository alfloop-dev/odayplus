      assignment_id:
        type:
        - string
        - 'null'
        format: uuid
      assignment_status:
        type:
        - string
        - 'null'
        enum:
        - ASSIGNED
        - CLAIMED
        - TRANSFERRED
        - ESCALATED
        - COMPLETED
        - null
      assignment_version:
        type:
        - integer
        - 'null'
        minimum: 1.0
      owner_subject_id:
        type:
        - string
        - 'null'
        format: uuid
      queue_id:
        type:
        - string
        - 'null'
      sla_instance_id:
        type:
        - string
        - 'null'
        format: uuid
      sla_state:
        type:
