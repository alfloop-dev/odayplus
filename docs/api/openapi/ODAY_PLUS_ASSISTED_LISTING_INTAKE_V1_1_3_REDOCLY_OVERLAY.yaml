      last_observed_at:
        type:
        - string
        - 'null'
        format: date-time
      issue:
        type:
        - string
        - 'null'
      next_action:
        type:
        - string
        - 'null'
      retryable:
        type: boolean
      quarantined:
        type: boolean
      failed:
        type: boolean
      location:
        $ref: '#/components/schemas/InboxLocationSummary'
      masking:
        $ref: '#/components/schemas/InboxMaskingSummary'
- target: $.components.schemas.IntakePage.properties.total_count
