  version: 1.1.1
extends: ./ODAY_PLUS_ASSISTED_LISTING_INTAKE_V1_1_OVERLAY.yaml

# Apply after the base OpenAPI and v1.1 command overlay.

actions:
  - target: $.components.schemas.ReviewDecisionRequest.properties.decision
    description: v1 supports a complete approve/reject lifecycle. Return-for-change is deferred until a changes-requested and resubmission state/API contract is approved.
    update:
      type: string
      enum: [APPROVE, REJECT]

