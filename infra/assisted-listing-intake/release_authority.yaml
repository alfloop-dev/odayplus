# Assisted Listing Intake v1 — section 12 release-authority approval register.
#
# Mirror of docs/design/ODAY_PLUS_ASSISTED_LISTING_INTAKE_SYSTEM_DESIGN_RESPONSE.md §12.
# The release harness treats this file as the machine-readable approval record:
# a gate row moves to `approved` only when a human owner records it here with
# approver + approved_at + evidence_ref. While ANY row is `pending`, its
# fail_closed_effect is enforced and governed cutover is BLOCKED.
#
# DO NOT flip a status in this file from automation. Approval recording is a
# human release-authority action (see docs/runbooks/assisted-listing-intake-release.md).

