services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: oday
      POSTGRES_USER: oday
      POSTGRES_PASSWORD: oday-local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oday -d oday"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - oday-postgres:/var/lib/postgresql/data

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    environment:
      ODAY_ENV: local
      ODAY_DATABASE_URL: postgresql+psycopg://oday:oday-local@postgres:5432/oday
      ODAY_LOG_FORMAT: json
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  oday-postgres:
